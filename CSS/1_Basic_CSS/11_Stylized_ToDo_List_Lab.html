<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="12_styles_ToDo_List_Lab.css">
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <ul class="todo-list">
        <li>
            <input type="checkbox" id="task1">
            <label for="task1">Explore gaming keyboards</label>
            <ul class="sub-item">
                <li>
                    <a href="https://x.com/demegorash" class="sub-item-link" target="_blank" rel="noopener noreferrer">Store link</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="task2">
            <label for="task2">Finish the report</label>
            <ul class="sub-item">
                <li>
                    <a href="https://x.com/demegorash" class="sub-item-link" target="_blank" rel="noopener noreferrer">Request Access</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="task3">
            <label for="task3">View Phone's Warranty</label>
            <ul class="sub-item">
                <li>
                    <a href="https://x.com/demegorash" class="sub-item-link" target="_blank" rel="noopener noreferrer">View Receipts</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="task4">
            <label for="task4">Check Processor Specs</label>
            <ul class="sub-item">
                <li>
                    <a href="https://x.com/demegorash" class="sub-item-link" target="_blank" rel="noopener noreferrer">View Model Number</a>
                </li>
            </ul>
        </li>
    </ul>
    </div>
</body>
</html>
